<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>HEXA Patrimoine — Accès conseillers</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#16706e">
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0; min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: linear-gradient(135deg, #16706e 0%, #0d4544 100%);
    padding: 20px;
  }
  .card {
    background: #fff; border-radius: 16px; padding: 32px 28px;
    width: 100%; max-width: 380px;
    box-shadow: 0 12px 40px rgba(0,0,0,0.25);
  }
  h1 { font-size: 20px; margin: 0 0 4px; color: #16706e; }
  p.sub { margin: 0 0 24px; color: #666; font-size: 14px; }
  label { display: block; font-size: 13px; color: #444; margin-bottom: 6px; font-weight: 600; }
  input {
    width: 100%; padding: 13px 14px; font-size: 16px;
    border: 1.5px solid #ddd; border-radius: 10px; outline: none;
  }
  input:focus { border-color: #16706e; }
  button {
    width: 100%; margin-top: 18px; padding: 14px; font-size: 16px; font-weight: 600;
    color: #fff; background: #16706e; border: none; border-radius: 10px; cursor: pointer;
  }
  button:hover { background: #0d5453; }
  button:disabled { background: #9bbcbb; cursor: default; }
  .msg { margin-top: 16px; font-size: 14px; min-height: 20px; text-align: center; }
  .msg.error { color: #c0392b; }
  .msg.ok { color: #16706e; }
</style>
</head>
<body>
  <div class="card">
    <h1>HEXA Patrimoine</h1>
    <p class="sub">Espace réservé aux conseillers autorisés</p>
    <label for="prenom">Prénom</label>
    <input id="prenom" type="text" autocomplete="off" placeholder="Votre prénom" autofocus>
    <button id="btn">Se connecter</button>
    <div id="msg" class="msg"></div>
  </div>

<script>
const input = document.getElementById('prenom');
const btn   = document.getElementById('btn');
const msg   = document.getElementById('msg');

function show(text, type) { msg.textContent = text; msg.className = 'msg ' + (type || ''); }

async function connecter() {
  const code = input.value.trim().toLowerCase();
  if (!code) { show("Veuillez saisir votre prénom.", "error"); return; }

  btn.disabled = true;
  show("Vérification…", "");

  try {
    // cache-buster pour toujours lire la dernière version publiée
    const res = await fetch('agents.json?_=' + Date.now());
    if (!res.ok) throw new Error("fichier introuvable");
    const data = await res.json();

    const agent = data.agents ? data.agents[code] : null;

    if (!agent) {
      show("Accès refusé : conseiller non reconnu.", "error");
      btn.disabled = false; return;
    }

    // Vérification de la date d'expiration (fin de journée incluse)
    if (agent.expire) {
      const finJour = new Date(agent.expire + 'T23:59:59');
      if (finJour < new Date()) {
        show("Accès expiré. Contactez l'administrateur.", "error");
        btn.disabled = false; return;
      }
    }

    show("Accès accordé. Chargement…", "ok");
    sessionStorage.setItem('hexa_agent', agent.nom || code);
    location.href = 'revenusfonciers.html';

  } catch (e) {
    show("Erreur de chargement. Réessayez.", "error");
    btn.disabled = false;
  }
}

btn.addEventListener('click', connecter);
input.addEventListener('keydown', e => { if (e.key === 'Enter') connecter(); });
</script>
</body>
</html>
